<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>High Scores</title>
<style>
  /* ===========================================================================
     Pixelated balloon-weather leaderboard — an attract screen for passers-by.
     Light-blue sky, white clouds, a hot-air balloon, sparkles. Reads the same
     localStorage['balloonLeaderboard'] the game writes. Shows only:
       rank (1,2,3) · username · seconds buffered (bare number, no label/unit).
     =========================================================================== */
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden;
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, "Courier New", monospace;
    color: #20303f; image-rendering: pixelated; -webkit-user-select: none; user-select: none;
    cursor: pointer; }
  /* the sky */
  body { background: linear-gradient(#7fc8f0, #bfe6ff 55%, #d9f0ff); }
  #bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

  /* the panel */
  .wrap { position: relative; z-index: 2; height: 100%; display: flex;
    flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .panel { width: min(560px, 94vw); background: rgba(255,255,255,0.82);
    border: 4px solid #fff; outline: 4px solid #ffd24a; outline-offset: 0;
    box-shadow: 0 10px 0 rgba(40,90,140,0.18), 0 0 0 8px rgba(255,255,255,0.35);
    border-radius: 4px; padding: 22px 22px 18px; backdrop-filter: blur(1px); }

  .title { text-align: center; line-height: 1; margin: 2px 0 4px; }
  .title .big { display: block; font-size: clamp(26px, 6vw, 40px); font-weight: 800;
    letter-spacing: 2px; color: #e8533f; text-shadow: 2px 2px 0 #fff6e0, 4px 4px 0 rgba(40,90,140,0.18); }
  .title .sub { display: block; font-size: 12px; letter-spacing: 4px; margin-top: 6px;
    color: #5a7591; }

  table { width: 100%; border-collapse: collapse; margin-top: 14px; font-variant-numeric: tabular-nums; }
  tr { border-bottom: 2px dotted rgba(90,117,145,0.35); }
  tr:last-child { border-bottom: none; }
  td { padding: 9px 6px; font-size: clamp(16px, 3.4vw, 22px); }
  .rank { width: 2.6em; text-align: center; font-weight: 800; color: #5a7591; }
  .name { font-weight: 700; color: #20303f; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 1px; } /* flexes to fill */
  td.name { width: 100%; }
  .num { text-align: right; font-weight: 800; color: #e8533f; white-space: nowrap; }
  /* top three get a little flair */
  tr.top1 .rank { color: #ffb300; } tr.top1 td { font-size: clamp(18px, 3.8vw, 24px); }
  tr.top2 .rank { color: #9aa7b5; }
  tr.top3 .rank { color: #c98a3c; }

  .empty { text-align: center; color: #5a7591; padding: 26px 8px 18px; line-height: 1.7; }

  .cta { text-align: center; margin-top: 14px; }
  .cta a { display: inline-block; text-decoration: none; background: #ffcf5c; color: #20160a;
    font-weight: 800; letter-spacing: 2px; padding: 12px 26px; border: 3px solid #fff;
    border-radius: 4px; box-shadow: 0 5px 0 rgba(40,90,140,0.25); font-size: 16px;
    animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  .foot { position: fixed; bottom: 8px; left: 0; right: 0; text-align: center; z-index: 2;
    font-size: 11px; letter-spacing: 2px; color: rgba(90,117,145,0.7); }
</style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="wrap">
    <div class="panel">
      <div class="title">
        <span class="big">HIGH SCORES</span>
        <span class="sub">★ DRIFT ★</span>
      </div>
      <table id="board"><tbody id="rows"></tbody></table>
      <div class="cta"><a href="weather.html">TAP&nbsp;TO&nbsp;PLAY</a></div>
    </div>
  </div>
  <div class="foot">CAN YOU MAKE THE BOARD?</div>

<script>
/* ---------------------------------------------------------------------------
   Leaderboard data — identical model + ranking to the game (weather.html):
   localStorage['balloonLeaderboard'] holds {username, score, bufferSeconds, ts}.
   Rank is by seconds buffered; legacy rows fall back to hoursSurvived so a
   mixed board still ranks sanely. We show ONLY the bare second-count number.
   --------------------------------------------------------------------------- */
const LB_KEY = "balloonLeaderboard";
const rowBuffer = r => (r.bufferSeconds != null ? r.bufferSeconds
                       : (r.hoursSurvived != null ? r.hoursSurvived : 0));
function loadLB() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { return []; } }
function topN(n) { return loadLB().slice().sort((a, b) => rowBuffer(b) - rowBuffer(a)).slice(0, n); }
const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

function render() {
  const rows = topN(10);
  const tb = document.getElementById("rows");
  if (!rows.length) {
    // no real scores yet — a friendly prompt, never fake rows
    tb.innerHTML = `<tr><td class="empty" colspan="3">★ be the first ★<br>tap to play</td></tr>`;
    return;
  }
  tb.innerHTML = rows.map((r, i) => {
    const cls = i < 3 ? ` class="top${i + 1}"` : "";
    return `<tr${cls}><td class="rank">${i + 1}</td>`
         + `<td class="name">${esc(r.username || "—")}</td>`
         + `<td class="num">${Math.round(rowBuffer(r))}</td></tr>`;
  }).join("");
}
render();
// keep the board live: re-render if the game (same origin) writes a new score,
// and poll as a backstop for same-tab writes that don't fire 'storage'.
addEventListener("storage", e => { if (e.key === LB_KEY) render(); });
setInterval(render, 3000);

// hidden kiosk reset — Ctrl/Cmd+Shift+Backspace wipes the board (after a confirm),
// so you can clear scores on the kiosk without opening DevTools.
addEventListener("keydown", e => {
  if (e.shiftKey && (e.ctrlKey || e.metaKey) && e.code === "Backspace") {
    e.preventDefault();
    if (confirm("Reset the leaderboard? This permanently clears all saved scores on this device.")) {
      localStorage.removeItem(LB_KEY);
      render();
    }
  }
});

// tapping anywhere (not just the button) starts a game — it's an attract screen
addEventListener("click", e => { if (!e.target.closest("a")) location.href = "weather.html"; });

/* ---------------------------------------------------------------------------
   Pixel-art backdrop — drifting clouds, sparkles, a bobbing hot-air balloon.
   Sprites reuse the exact grids + palettes from weather.html so the attract
   screen matches the game pixel-for-pixel.
   --------------------------------------------------------------------------- */
const cv = document.getElementById("bg"), g = cv.getContext("2d");
function makeSprite(rows, palette) {
  const grid = rows.map(r => r.split("")), h = grid.length, w = grid[0].length;
  const off = document.createElement("canvas"); off.width = w; off.height = h;
  const o = off.getContext("2d");
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    const c = palette[grid[y][x]]; if (c) { o.fillStyle = c; o.fillRect(x, y, 1, 1); }
  }
  return { off, w, h };
}
const balloon = makeSprite([
  "_._rrrrr_._","_rrrrrrrrr_","rrrrrRRrrrr","rrrRRwwRRrr","rrRRwwwwRRr",
  "rrRwwwwwwRr","rRwwwwwwRr_".split("").reverse().join(""),"_rRRwwwwRR_",
  "__rRRwwRR__","___rRRRr___","____rRr____","_____y_____","____ybby____","____ybby____",
], { _:0, r:"#e8533f", R:"#c23c2c", w:"#fff6e0", b:"#6b4226", y:"#ffd980" });
const cloud = makeSprite([
  "__cccc____","_ccccccc__","ccccccccc_","ssssssssss",
], { _:0, c:"#ffffff", s:"#e3f1ff" });
const sparkle = makeSprite([
  "____y____","____y____","___yYy___","__yYYYy__","yyYYYYYyy",
  "__yYYYy__","___yYy___","____y____","____y____",
], { _:0, y:"#fff3a8", Y:"#ffe87a" });

function blit(sp, cx, cy, scale) {
  g.imageSmoothingEnabled = false;
  const w = sp.w * scale, h = sp.h * scale;
  g.drawImage(sp.off, Math.round(cx - w / 2), Math.round(cy - h / 2), Math.round(w), Math.round(h));
}

let W, H, clouds, sparks, bal;
function reset() {
  W = cv.width = innerWidth; H = cv.height = innerHeight;
  clouds = Array.from({ length: 7 }, () => ({
    x: Math.random() * W, y: Math.random() * H * 0.85,
    s: 4 + Math.random() * 5, v: 6 + Math.random() * 14 }));
  sparks = Array.from({ length: 16 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    s: 1.5 + Math.random() * 2, ph: Math.random() * Math.PI * 2, sp: 1 + Math.random() * 2 }));
  bal = { x: W * 0.5, baseY: H * 0.62, s: 6 };
}
addEventListener("resize", reset); reset();

let t = 0, last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now; t += dt;
  g.clearRect(0, 0, W, H);
  for (const c of clouds) {
    c.x += c.v * dt; if (c.x - c.s * cloud.w > W) c.x = -c.s * cloud.w;
    blit(cloud, c.x, c.y, c.s);
  }
  for (const s of sparks) {
    s.ph += s.sp * dt;
    g.globalAlpha = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(s.ph));
    blit(sparkle, s.x, s.y, s.s);
  }
  g.globalAlpha = 1;
  // a gently drifting, bobbing balloon behind the panel
  const bx = bal.x + Math.sin(t * 0.25) * W * 0.18;
  const by = bal.baseY + Math.sin(t * 0.9) * 14;
  blit(balloon, bx, by, bal.s);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
